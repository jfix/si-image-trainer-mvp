paths:
  reference_root: /Users/jakob/Projects/si-reference-library/references
  live_root: /Users/jakob/Projects/collect-si-live-data/images
  live_data_root: /Users/jakob/Projects/collect-si-live-data/data
  place_mappings: /Users/jakob/Projects/collect-si-live-data/place-mappings.json
  reference_manifest: data/processed/reference_manifest.jsonl
  query_manifest: data/processed/query_manifest.jsonl
  eval_manifest: data/processed/eval_queries.jsonl
  index_dir: outputs/indexes
  report_dir: outputs/reports

embedding:
  type: pretrained
  model_name: outputs/models/dinov2_finetuned_aug_crop_labeled

retrieval:
  top_n: 12
  rerank_m: 5
  aggregate_method: max_mean
  stage1_allowed_roles:
    - reference
    - flash-reference
    - grosplan
  role_weights:
    reference: 1.0
    flash-reference: 0.92
    grosplan: 0.82
    status-empty-scene: 0.4

confidence:
  certainly_score: 0.59
  probably_score: 0.53
  maybe_score: 0.48
  unknown_score: 0.44
  margin_threshold: 0.15

detector:
  model_path: outputs/models/mosaic_detector_v3.pt
  conf: 0.25

training:
  model_name: facebook/dinov2-small
  output_dir: outputs/models/dinov2_finetuned_aug
  epochs: 20
  batch_size: 16
  lr: 1.0e-5
  margin: 0.3
  unfreeze_last_n_blocks: 2
  augment: true
